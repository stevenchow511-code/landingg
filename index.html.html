<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Box Pro</title>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  text-align:center;
}

/* CONTAINER */
.container{
  max-width:400px;
  margin:auto;
  padding:20px;
}

/* TITLE */
h1{
  color:#ffd700;
}

/* BOX */
.box{
  width:160px;
  height:160px;
  margin:40px auto;
  background:url('https://media.giphy.com/media/3o6ZtpxSZbQRRnwCKQ/giphy.gif') no-repeat center/contain;
  cursor:pointer;
  transition:0.3s;
}

/* SHAKE */
.shake{
  animation:shake 0.5s;
}

@keyframes shake{
  25%{transform:rotate(10deg);}
  50%{transform:rotate(-10deg);}
  75%{transform:rotate(5deg);}
}

/* RESULT */
.result{
  display:none;
  margin-top:20px;
  font-size:18px;
}

/* GLOW EFFECT */
.glow{
  animation:glow 1s infinite alternate;
}

@keyframes glow{
  from{filter:drop-shadow(0 0 5px gold);}
  to{filter:drop-shadow(0 0 20px gold);}
}

/* BUTTON */
.btn{
  margin-top:20px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff7a18,#ff3d00);
  color:white;
  cursor:pointer;
}

/* NOTIF */
.notif{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#fff;
  color:#000;
  padding:10px 15px;
  border-radius:10px;
  font-size:13px;
  opacity:0;
  transform:translateY(20px);
  transition:0.5s;
}

.notif.show{
  opacity:1;
  transform:translateY(0);
}

</style>
</head>

<body>

<div class="container">
<h1>🎁 MYSTERY BOX 🎁</h1>
<p>Klik box untuk membuka hadiahmu</p>

<div class="box glow" id="box" onclick="openBox()"></div>

<div class="result" id="result"></div>

<button class="btn" onclick="location.reload()">Coba Lagi</button>
</div>

<div class="notif" id="notif"></div>

<script>

function openBox(){
  let box = document.getElementById("box");
  let result = document.getElementById("result");

  // STEP 1: SHAKE
  box.classList.remove("glow");
  box.classList.add("shake");

  // STEP 2: GANTI KE GIF BUKA
  setTimeout(()=>{
    box.style.background = "url('https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif') center/contain no-repeat";
  },500);

  // STEP 3: KELUAR HADIAH
  let hadiah = [
    "🎉 10.000 Coin",
    "🔥 25.000 Coin",
    "😱 50.000 Coin",
    "💎 100.000 Coin",
    "🎁 Spin Gratis x3"
  ];

  let random = hadiah[Math.floor(Math.random()*hadiah.length)];

  setTimeout(()=>{
    result.style.display="block";
    result.innerHTML = "Kamu mendapatkan:<br><b>"+random+"</b>";
  },1200);

}

/* POPUP FAKE */
let nama = ["Andi","Budi","Rina","Sari","Dika","Fajar","Agus","Nina"];
let hadiahNotif = [
  "mendapat 10.000 Coin",
  "mendapat 50.000 Coin",
  "mendapat Jackpot!",
  "mendapat Spin Gratis"
];

function showNotif(){
  let notif = document.getElementById("notif");

  let user = nama[Math.floor(Math.random()*nama.length)];
  let hadiah = hadiahNotif[Math.floor(Math.random()*hadiahNotif.length)];

  notif.innerHTML = "🎉 "+user+" "+hadiah;
  notif.classList.add("show");

  setTimeout(()=>{
    notif.classList.remove("show");
  },3000);
}

setInterval(showNotif,4000);

</script>

</body>
</html>
