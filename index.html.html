<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin Wheel Premium</title>

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#111,#1c1c1c);
    font-family:Arial;
    color:white;
}

/* INPUT KODE */
input{
    padding:10px;
    border-radius:8px;
    border:none;
    margin-bottom:10px;
    width:200px;
    text-align:center;
}

/* BUTTON */
button{
    margin-top:10px;
    padding:12px 25px;
    font-size:16px;
    border:none;
    cursor:pointer;
    border-radius:10px;
    background:#00c853;
    color:white;
    font-weight:bold;
}

/* CONTAINER */
.container{
    position:relative;
    width:90vw;
    max-width:320px;
    aspect-ratio:1/1;
    margin-top:10px;
}

/* WHEEL */
#wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    border:5px solid #fff;
    transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);
}

/* POINTER */
.pointer{
    position:absolute;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:18px solid transparent;
    border-right:18px solid transparent;
    border-bottom:30px solid red;
    filter:drop-shadow(0 0 6px red);
}

/* RESULT POPUP */
#popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    display:none;
    text-align:center;
    z-index:999;
}

/* OVERLAY */
#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
}
</style>
</head>

<body>

<input id="code" placeholder="Masukkan Kode Spin">

<button onclick="spin()">SPIN</button>

<div class="container">
    <div class="pointer"></div>
    <canvas id="wheel" width="300" height="300"></canvas>
</div>

<div id="overlay"></div>

<div id="popup">
    <h2 id="resultText"></h2>
    <button onclick="closePopup()">OK</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const segments = ["10K","20K","0","5K","50K","Try Again"];

// 🎯 WEIGHTED (peluang bisa diatur)
const weighted = [
"10K","20K","0","5K",
"Try Again","Try Again","Try Again",
"10K","5K","0",
"50K"
];

const colors = ["#ff4d4d","#4dff88","#ffd24d","#4da6ff","#b84dff","#ff7aa8"];

let angle = 0;
let spinning = false;

/* DRAW WHEEL */
function drawWheel(){
    const arc = (2 * Math.PI) / segments.length;

    for(let i=0;i<segments.length;i++){
        ctx.beginPath();
        ctx.fillStyle = colors[i];
        ctx.moveTo(150,150);
        ctx.arc(150,150,150,i*arc,(i+1)*arc);
        ctx.fill();

        ctx.save();
        ctx.translate(150,150);
        ctx.rotate(i*arc + arc/2);
        ctx.fillStyle = "#000";
        ctx.font = "bold 14px Arial";
        ctx.textAlign = "center";
        ctx.fillText(segments[i], 90, 5);
        ctx.restore();
    }
}
drawWheel();

/* SOUND */
const spinSound = new Audio("https://www.soundjay.com/mechanical/sounds/click-07.mp3");
const winSound = new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");

/* SPIN */
function spin(){

    if(spinning) return;

    let code = document.getElementById("code").value;

    // 🔐 validasi kode
    if(code !== "FREE123"){
        alert("Kode salah!");
        return;
    }

    spinning = true;

    let randomResult = weighted[Math.floor(Math.random()*weighted.length)];
    let index = segments.indexOf(randomResult);
    let arc = 360 / segments.length;

    let offset = 270;
    let stopAngle = (360 * 5) + (offset - (index * arc) - arc/2);

    angle += stopAngle;

    spinSound.play();

    canvas.style.transform = `rotate(${angle}deg)`;

    setTimeout(()=>{
        spinning = false;
        showPopup(randomResult);

        if(randomResult !== "Try Again"){
            confetti();
            winSound.play();
        }
    },4000);
}

/* POPUP */
function showPopup(text){
    document.getElementById("resultText").innerText = "Hasil: " + text;
    document.getElementById("popup").style.display = "block";
    document.getElementById("overlay").style.display = "block";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
