<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Box Event</title>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  text-align:center;
}

/* CONTAINER */
.container{
  padding:20px;
  max-width:400px;
  margin:auto;
}

/* TITLE */
h1{
  font-size:26px;
  color:#ffd700;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  outline:none;
  text-align:center;
}

/* BUTTON */
.btn{
  margin-top:15px;
  padding:12px;
  width:100%;
  border:none;
  background:linear-gradient(45deg,#ff7a18,#ff3d00);
  color:white;
  font-size:16px;
  border-radius:10px;
  cursor:pointer;
}

.btn:disabled{
  background:gray;
}

/* BOX */
.box{
  width:160px;
  height:160px;
  margin:30px auto;
  background:url('https://cdn-icons-png.flaticon.com/512/869/869636.png') no-repeat center/contain;
  cursor:pointer;
  display:none;
}

/* RESULT */
.result{
  font-size:18px;
  margin-top:20px;
  display:none;
}

/* NOTIF */
.notif{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#fff;
  color:#000;
  padding:10px 15px;
  border-radius:10px;
  font-size:13px;
  opacity:0;
  transform:translateY(20px);
  transition:0.5s;
}

.notif.show{
  opacity:1;
  transform:translateY(0);
}

/* ANIM */
.open{
  animation:shake 0.5s;
}

@keyframes shake{
  25%{transform:rotate(10deg);}
  50%{transform:rotate(-10deg);}
  75%{transform:rotate(5deg);}
}

</style>
</head>

<body>

<div class="container">

<h1>🎁 MYSTERY BOX FIRST TIME BONUS 🎁</h1>
<p>Masukkan kode untuk membuka box, Klaim Ke Mimin </p>

<input type="text" id="kode" placeholder="Masukkan kode disini">
<button class="btn" onclick="cekKode()">Buka Akses</button>

<div class="box" id="box" onclick="openBox()"></div>

<div class="result" id="result"></div>

</div>

<div class="notif" id="notif"></div>

<script>

/* VALID CODE */
let validKode = ["FREE10","HOKI666","BONUS2026"];

/* CEK KODE */
function cekKode(){
  let input = document.getElementById("kode").value;
  let box = document.getElementById("box");

  if(validKode.includes(input)){
    alert("Kode berhasil! Silakan buka box 🎉");
    box.style.display="block";
  }else{
    alert("Kode salah!");
  }
}

/* OPEN BOX */
function openBox(){
  let hadiah = [
    "🎉 Rp 20.000",
    "🔥 Rp 25.000",
    "😱 Rp 50.000",
    "💎 Rp 100.000",
    "🎁 Spin Gratis x3"
  ];

  let result = document.getElementById("result");
  let box = document.getElementById("box");

  let random = hadiah[Math.floor(Math.random()*hadiah.length)];

  box.classList.add("open");

  setTimeout(()=>{
    result.style.display="🎁";
    result.innerHTML = "Kamu mendapatkan: <b>"+random+"</b>";
    
    /* REDIRECT DELAY */
    setTimeout(()=>{
      window.location.href="https://shortq.link/klaim-spin"; // GANTI LINK LU
    },3000);

  },500);
}

/* FAKE LIVE NOTIF */
let nama = ["Andi","Budi","Rina","Sari","Dika","Fajar","Agus","Nina"];
let hadiahNotif = [
  "mendapat Rp 20.000",
  "mendapat Rp 50.000",
  "mendapat Jackpot!",
  "mendapat Spin Gratis"
];

function showNotif(){
  let notif = document.getElementById("notif");

  let user = nama[Math.floor(Math.random()*nama.length)];
  let hadiah = hadiahNotif[Math.floor(Math.random()*hadiahNotif.length)];

  notif.innerHTML = "🎉 "+user+" "+hadiah;
  notif.classList.add("show");

  setTimeout(()=>{
    notif.classList.remove("show");
  },3000);
}

setInterval(showNotif,4000);

</script>

</body>
</html>
