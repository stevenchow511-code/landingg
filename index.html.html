<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Spin Code</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
background:url("https://i.ibb.co/d0Rj3zmn/image.png") center/cover no-repeat fixed;
color:#fff;text-align:center;
}

body::before{
content:"";position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);z-index:-1;
}

h1{margin-top:30px;}

.btn{
padding:12px 25px;
background:linear-gradient(135deg,#ff7a18,#ff3d00);
border:none;border-radius:30px;color:#fff;
cursor:pointer;margin-top:10px;
}

input{
padding:10px;
border-radius:10px;
border:none;
text-align:center;
margin-top:15px;
}

canvas{margin-top:20px;}
</style>
</head>

<body>

<h1>🎯 SPIN & MENANGKAN HADIAH</h1>

<p id="kode-user"></p>

<input type="text" id="kode" placeholder="Masukkan kode disini">
<br>
<button id="spin-btn" class="btn">PUTAR</button>

<canvas id="wheel" width="300" height="300"></canvas>

<p id="result"></p>

<script>
// ===== GENERATE KODE =====
function generateKode(length=8){
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
let result="";
for(let i=0;i<length;i++){
result+=chars.charAt(Math.floor(Math.random()*chars.length));
}
return result;
}

// ===== SIMPAN KODE =====
let kodeBenar=localStorage.getItem("kodeSpin");

if(!kodeBenar){
kodeBenar=generateKode(8);
localStorage.setItem("kodeSpin",kodeBenar);
}

// tampilkan kode
document.getElementById("kode-user").innerHTML=
"Kode kamu: <b>"+kodeBenar+"</b>";

// ===== WHEEL =====
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

const segments=["10 RB","5 RB","SCATTER","FREE SPIN","1 JT","20 RB"];
const colors=["#ff4b2b","#ff416c","#00f7ff","#39ff14","#b026ff","#ffdd00"];

let startAngle=0;
let spinning=false;

function drawWheel(){
const center=150;
const radius=150;
const arc=(2*Math.PI)/segments.length;

ctx.clearRect(0,0,300,300);

for(let i=0;i<segments.length;i++){
ctx.beginPath();
ctx.fillStyle=colors[i];
ctx.moveTo(center,center);
ctx.arc(center,center,radius,startAngle+i*arc,startAngle+(i+1)*arc);
ctx.fill();

ctx.save();
ctx.translate(center,center);
ctx.rotate(startAngle+i*arc+arc/2);
ctx.fillStyle="#000";
ctx.textAlign="right";
ctx.font="14px Arial";
ctx.fillText(segments[i],radius-10,5);
ctx.restore();
}
}

drawWheel();

// ===== SPIN =====
document.getElementById("spin-btn").onclick=function(){

const inputKode=document.getElementById("kode").value;

// VALIDASI
if(inputKode!==kodeBenar){
alert("❌ Kode salah!");
return;
}

if(spinning)return;
spinning=true;

const spinAngle=Math.random()*3000+4000;
const duration=4000;
let start=null;

function animate(timestamp){
if(!start)start=timestamp;
const progress=timestamp-start;
const rotation=easeOut(progress,0,spinAngle,duration);
startAngle=(rotation*Math.PI/180);
drawWheel();

if(progress<duration){
requestAnimationFrame(animate);
}else{
finishSpin();
}
}

function finishSpin(){
const degrees=(startAngle*180/Math.PI+90)%360;
const index=Math.floor((360-degrees)/(360/segments.length))%segments.length;

document.getElementById("result").innerHTML=
"🎉 Kamu dapat: <b>"+segments[index]+"</b>";

spinning=false;

// HAPUS KODE (1x pakai)
localStorage.removeItem("kodeSpin");
}

requestAnimationFrame(animate);
};

function easeOut(t,b,c,d){
t/=d;t--;
return c*(t*t*t+1)+b;
}
</script>

</body>
</html>
