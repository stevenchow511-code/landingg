<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin Wheel</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#111;
    font-family:Arial;
    color:white;
}

/* RESPONSIVE CONTAINER */
.container{
    position:relative;
    width:90vw;
    max-width:320px;
    aspect-ratio:1/1;
}

/* CANVAS RESPONSIVE */
#wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    border:5px solid #fff;
    transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);
}

/* POINTER / JARUM */
.pointer{
    position:absolute;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:18px solid transparent;
    border-right:18px solid transparent;
    border-bottom:30px solid #ff0000;
    z-index:10;
    filter: drop-shadow(0 0 6px red);
}

button{
    margin-top:30px;
    padding:12px 25px;
    font-size:16px;
    border:none;
    cursor:pointer;
    border-radius:10px;
    background:#00c853;
    color:white;
}

#result{
    margin-top:20px;
    font-size:18px;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">
    <div class="pointer"></div>
    <canvas id="wheel" width="300" height="300"></canvas>
</div>

<button onclick="spin()">SPIN</button>
<div id="result"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const segments = ["10K", "20K", "0", "5K", "50K", "Try Again"];
const colors = ["#ff4d4d","#4dff88","#ffd24d","#4da6ff","#b84dff","#ff7aa8"];

let angle = 0;

function drawWheel(){
    const arc = (2 * Math.PI) / segments.length;

    for(let i=0;i<segments.length;i++){
        ctx.beginPath();
        ctx.fillStyle = colors[i];
        ctx.moveTo(150,150);
        ctx.arc(150,150,150,i*arc,(i+1)*arc);
        ctx.fill();

        ctx.save();
        ctx.translate(150,150);
        ctx.rotate(i*arc + arc/2);
        ctx.fillStyle = "#000";
        ctx.font = "bold 14px Arial";
        ctx.textAlign = "center";
        ctx.fillText(segments[i], 90, 5);
        ctx.restore();
    }
}

drawWheel();

function spin(){
    let randomIndex = Math.floor(Math.random() * segments.length);
    let arc = 360 / segments.length;

    // offset pointer (karena jarum di atas)
    let offset = 270;

    // berhenti tepat di tengah segment
    let stopAngle = (360 * 5) + (offset - (randomIndex * arc) - arc/2);

    angle += stopAngle;

    canvas.style.transform = `rotate(${angle}deg)`;

    setTimeout(()=>{
        document.getElementById("result").innerText =
        "Hasil: " + segments[randomIndex];
    },4000);
}
</script>

</body>
</html>
