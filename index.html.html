<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Gift</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* BACKGROUND FULL */
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('https://i.ibb.co/XrpLYyL3/image.png') no-repeat center center;

  background-size:cover;
  color:white;
  text-align:center;
}

/* CONTAINER */
.container{
  width:90%;
  max-width:400px;
  padding:25px;
  border-radius:15px;

  background:#050505;

  box-shadow:
    0 0 10px #00ffff,
    0 0 30px #00ffff;
}

/* TITLE */
h1{
  font-size:26px;
  margin-bottom:15px;
  color:#00ffff;

  text-shadow:
    0 0 5px #00ffff,
    0 0 10px #00ffff,
    0 0 20px #00ffff,
    0 0 40px #00ffff;
}

/* TEXT */
p{
  margin-bottom:15px;
  font-size:14px;
  color:#ccc;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  outline:none;
  margin-bottom:15px;

  background:#111;
  color:white;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  margin-top:10px;

  background:#050505;
  color:#00ffff;
  border:2px solid #00ffff;

  box-shadow:
    0 0 10px #00ffff,
    0 0 20px #00ffff;

  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#00ffff;
  color:#000;

  box-shadow:
    0 0 20px #00ffff,
    0 0 40px #00ffff;
}

/* MOBILE FIX */
@media(max-width:480px){
  h1{
    font-size:22px;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>🎁 MYSTERY GIFT 🎁</h1>
  <p>Masukkan kode untuk membuka kado</p>

  <input type="text" placeholder="Masukkan kode disini">

  <button>Buka Akses</button>
  <button>Klaim Hadiah</button>
</div>

</body>
</html>
