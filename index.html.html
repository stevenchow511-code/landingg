<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Gift Box</title>

<!-- FAVICON -->
<link rel="icon" href="https://i.ibb.co/35kzSv2C/image.png" type="image/png">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: url('https://picsum.photos/800/1200') no-repeat center center;
  background-size: cover;
  color:white;
  text-align:center;
}

.container{
  max-width:400px;
  margin:auto;
  padding:20px;
}

h1{
  color:#ffd700;
}

/* INPUT */
input{
  width:60%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  text-align:center;
}

/* BUTTON */
.btn{
  margin-top:10px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff7a18,#ff3d00);
  color:white;
  cursor:pointer;
}

/* BOX */
.box{
  width:170px;
  height:170px;
  margin:40px auto;
  background: url('https://i.ibb.co/35kzSv2C/image.png') no-repeat center/contain;
  cursor:pointer;
  display:none;
  box-shadow: 0 0 20px gold;
}

/* SHAKE */
.shake{
  animation:shake 0.5s;
}

@keyframes shake{
  25%{transform:rotate(8deg);}
  50%{transform:rotate(-8deg);}
  75%{transform:rotate(4deg);}
}

/* RESULT */
.result{
  display:none;
  margin-top:20px;
  font-size:18px;
}

/* NOTIF */
.notif{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#fff;
  color:#000;
  padding:10px 15px;
  border-radius:10px;
  font-size:13px;
  opacity:0;
  transform:translateY(20px);
  transition:0.5s;
}

.notif.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div class="container">

<h1>🎁 MYSTERY GIFT 🎁</h1>
<p>Masukkan kode untuk membuka kado First Time Bonus</p>

<input type="text" id="kode" placeholder="Masukkan kode disini">
<button class="btn" onclick="cekKode()">Buka Akses</button>

<!-- BOX -->
<div class="box" id="box" onclick="openBox()"></div>

<div class="result" id="result"></div>

<button class="btn" onclick="window.location.href='https://alurinaja.com/'">
  Klaim Hadiah
</button>

</div>

<div class="notif" id="notif"></div>

<script>

/* VALID CODE */
let validKode = ["FREE100","HOKI777","GIFT2026"];

/* CEK KODE */
function cekKode(){
  let input = document.getElementById("kode").value;
  let box = document.getElementById("box");

  if(validKode.includes(input)){
    alert("Kode benar! Klik kado 🎉");
    box.style.display="block";
  }else{
    alert("Kode salah!");
  }
}

/* OPEN BOX */
function openBox(){
  let box = document.getElementById("box");
  let result = document.getElementById("result");

  // reset animasi biar bisa di klik ulang
  box.classList.remove("shake");
  void box.offsetWidth;
  box.classList.add("shake");

  localStorage.setItem("sudahMain","yes");

  setTimeout(()=>{
    box.style.background = "url('https://i.ibb.co/MkKmD8Fb/image.png') center / contain no-repeat";
  },500);

  let hadiah = [
    "🎉 Rp 10.000",
    "🔥 Rp 25.000",
    "😱 Rp 50.000",
    "💎 Rp 100.000",
    "🎁 Spin Gratis x3"
  ];

  let random = hadiah[Math.floor(Math.random()*hadiah.length)];

  setTimeout(()=>{
    result.style.display="block";
    result.innerHTML = "Kamu mendapatkan:<br><b>"+random+"</b>";
  },1200);
}

/* POPUP */
let nama = ["Andiwin","Budigacor","Rina14","Sari32","Dika45","Fajar12","Dhea","Maxwin88","Sehat747"];

let hadiahNotif = [
  "mendapat Rp 10.000",
  "mendapat Spin Gratis",
  "mendapat Rp 50.000",
  "mendapat Rp 100.000"
];

function showNotif(){
  let notif = document.getElementById("notif");

  let user = nama[Math.floor(Math.random()*nama.length)];
  let hadiah = hadiahNotif[Math.floor(Math.random()*hadiahNotif.length)];

  notif.innerHTML = "🎉 "+user+" "+hadiah;
  notif.classList.add("show");

  setTimeout(()=>{
    notif.classList.remove("show");
  },3000);
}

/* CEK SAAT HALAMAN DIBUKA */
window.onload = function(){
  let sudahMain = localStorage.getItem("sudahMain");

  if(sudahMain){
    document.getElementById("box").style.display="none";
    document.getElementById("result").style.display="block";
    document.getElementById("result").innerHTML = "⚠️ Kamu sudah klaim hadiah hari ini";
    document.getElementById("kode").disabled = true;
  }
}

setInterval(showNotif,4000);

</script>

</body>
</html>
